<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mayores de Edad</title>
</head>

<body>
  <script type="module">
    import cGrupo from "./dist/controllers/Cl_cGrupo.js";
    new cGrupo();
  </script>

  <div id="body">
    <section id="persona" hidden>
      <div>
        <h5 id="persona_lblPersona">Procesar Persona</h5>
      </div>
      <div>
        <label>Nombre:
          <input type="text" id="persona_inNombre" placeholder="Ej: Luis">
        </label>
      </div>
      <div>
        <label>Edad:
          <input type="number" id="persona_inEdad" placeholder="Ej: 15">
        </label>
      </div>
      <div>
        <button id="persona_btCancelar">Cancelar</button>
        <button id="persona_btAceptar">Aceptar</button>
      </div>
    </section>

    <hr>

    <div style="margin-bottom: 20px;">
      <button id="body_btProcesarPersona">Procesar 1 Persona</button>
    </div>

    <div>
      Registros procesados: <span id="body_lblContPersonas">0</span>
    </div>
    <div>
      Cantidad de personas mayor de edad: <span id="body_lblContMayores">0</span>
    </div>
    <div>
      Porcentaje de personas mayor de edad: <span id="body_lblPorcentajeMayores">0.00</span>%
    </div>
  </div>
</body>

</html>
